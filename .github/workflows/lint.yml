name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-compile:
    name: python compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: compile check
        run: |
          python3 -m py_compile plugin/bridge.py plugin/__init__.py
          python3 -m py_compile installer/install.py
          python3 -m py_compile scripts/post_call_summary.py
      - name: Install PyYAML
        run: pip install pyyaml
      - name: yaml lint
        run: python3 -c "import yaml; yaml.safe_load(open('plugin/plugin.yaml').read())"

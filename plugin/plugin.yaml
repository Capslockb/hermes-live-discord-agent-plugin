name: discord-voice
version: 0.3.6
kind: standalone
platforms: [linux]
description: High-performance Discord Voice bridge via Gemini Multimodal Live API
python_requirements:
  - requirements.txt
provides_tools:
  - voice_live
  - voice_live_leave
  - voice_live_status
  - voice_live_frame
  - voice_live_video_status
  - voice_live_notes
  - sora_bridge_preflight
  - sora_live_grill
  - sora_goal_synth
  - sora_redact
requirements_env:
  - name: DISCORD_BOT_TOKEN
    prompt: "Discord bot token"
    password: true
  - name: GEMINI_API_KEY
    prompt: "Google Gemini API key"
    password: true
optional_env:
  - name: GEMINI_MODEL
    prompt: "Gemini Live model (default: gemini-3.1-flash-live-preview)"
    password: false
  - name: GEMINI_LIVE_MODEL_FALLBACKS
    prompt: "Comma-separated Gemini Live fallback models"
    password: false
  - name: DISCORD_VOICE_LIVE_PORT
    prompt: "Local HTTP control port (default: 18943)"
    password: false
  - name: DISCORD_VOICE_LIVE_VOICE
    prompt: "Gemini Live voice name (default: Kore)"
    password: false
  - name: VOICE_LIVE_HONCHO_CONTEXT
    prompt: "Enable Honcho memory context injection (default: true)"
    password: false
  - name: VOICE_LIVE_HONCHO_PEER
    prompt: "Optional Honcho peer override"
    password: false
  - name: DISCORD_VOICE_LIVE_SAFE_MODE
    prompt: "Future safe-mode flag for minimal tools during diagnostics"
    password: false

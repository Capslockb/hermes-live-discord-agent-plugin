name: discord-voice
version: 0.3.0
kind: standalone
platforms: [linux]
description: Hermes Live Discord Agent Plugin — full-duplex Discord voice ↔ Google Gemini Multimodal Live (audio + vision + function calling + transcripts + multi-CLI delegation)
python_requirements:
  - requirements.txt
provides_tools:
  - voice_live
  - voice_live_leave
  - voice_live_status
  - voice_live_frame
  - voice_live_notes
  - sora_bridge_preflight
  - sora_live_grill
  - sora_goal_synth
  - sora_redact
requirements_env:
  - name: DISCORD_BOT_TOKEN
    prompt: "Discord bot token"
    password: true
  - name: GEMINI_API_KEY
    prompt: "Google Gemini API key"
    password: true
optional_env:
  - name: GEMINI_MODEL
    prompt: "Gemini Live model (default: gemini-3.1-flash-live-preview)"
    password: false
  - name: GEMINI_LIVE_MODEL_FALLBACKS
    prompt: "Comma-separated Gemini Live fallback models"
    password: false
  - name: DISCORD_VOICE_LIVE_PORT
    prompt: "Local HTTP control port (default: 18943)"
    password: false
  - name: DISCORD_VOICE_LIVE_VOICE
    prompt: "Gemini Live voice name (default: Aoede)"
    password: false
  - name: DISCORD_VOICE_LIVE_NOTES_DIR
    prompt: "Directory for voice-live notes/transcripts"
    password: false
  - name: VOICE_LIVE_HONCHO_CONTEXT
    prompt: "Enable Honcho memory context for live sessions (true/false)"
    password: false
  - name: VOICE_LIVE_HONCHO_PEER
    prompt: "Honcho peer alias for live session memory"
    password: false
